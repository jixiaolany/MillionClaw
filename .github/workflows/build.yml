name: Build MillionClaw EXE

on:
  push:
    branches: [ master, main ]
  workflow_dispatch:

env:
  NODE_VERSION: '22'
  PNPM_VERSION: '9'

jobs:
  build:
    runs-on: windows-latest
    
    steps:
    - name: Checkout
      uses: actions/checkout@v4
      with:
        fetch-depth: 1
    
    - name: Setup Node.js ${{ env.NODE_VERSION }}
      uses: actions/setup-node@v4
      with:
        node-version: ${{ env.NODE_VERSION }}
    
    - name: Install pnpm
      run: npm install -g pnpm@${{ env.PNPM_VERSION }}
    
    - name: Install dependencies (skip scripts to avoid vite build errors)
      shell: pwsh
      run: pnpm install --frozen-lockfile=false --ignore-scripts
    
    - name: Build OpenClaw with tsdown
      shell: pwsh
      run: pnpm exec tsdown
    
    - name: Verify dist
      shell: pwsh
      run: |
        if (Test-Path dist) {
          Write-Host "dist folder exists"
          Get-ChildItem dist -File | Measure-Object -Property Length -Sum | ForEach-Object {
            Write-Host "Total size: $([math]::Round($_.Sum/1MB, 2)) MB"
          }
        } else {
          Write-Host "ERROR: dist not found!"
          exit 1
        }
    
    - name: Install pkg
      shell: pwsh
      run: npm install -g pkg
    
    - name: Package EXE
      shell: pwsh
      run: |
        pkg dist/index.js --targets node22-win-x64 --output millionclaw.exe --public --compress
        if (-not (Test-Path millionclaw.exe)) {
          Write-Host "ERROR: millionclaw.exe not created"
          exit 1
        }
        $size = (Get-Item millionclaw.exe).Length / 1MB
        Write-Host "SUCCESS: millionclaw.exe created, size: $([math]::Round($size, 2)) MB"
    
    - name: Upload artifact
      uses: actions/upload-artifact@v4
      with:
        name: millionclaw-windows
        path: millionclaw.exe
        retention-days: 30

  release:
    runs-on: ubuntu-latest
    needs: build
    if: github.event_name == 'push' && github.ref == 'refs/heads/master'
    
    steps:
    - name: Download
      uses: actions/download-artifact@v4
      with:
        name: millionclaw-windows
        path: ./artifacts
    
    - name: List files
      run: ls -la ./artifacts/
    
    - name: Create Release
      uses: softprops/action-gh-release@v2
      with:
        files: ./artifacts/millionclaw.exe
        prerelease: true
        tag_name: v0.1.0
        name: MillionClaw v0.1.0
        body: |
          ## MillionClaw (Bai Wan Zhua) - First Release
          
          A user-friendly OpenClaw desktop companion for Windows.
          
          ### Quick Start
          1. Download and run millionclaw.exe
          2. Configure your OpenClaw gateway
          3. Enjoy your AI assistant!
          
          ### Learn More
          - GitHub: https://github.com/jixiaolany/MillionClaw
          - Docs: https://docs.openclaw.ai
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}