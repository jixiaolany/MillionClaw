name: Build MillionClaw EXE

on:
  push:
    branches: [ master, main ]
  workflow_dispatch:

env:
  NODE_VERSION: '22'

jobs:
  build:
    runs-on: windows-latest
    
    steps:
    - name: Checkout
      uses: actions/checkout@v4
      with:
        fetch-depth: 1
    
    - name: Setup Node.js ${{ env.NODE_VERSION }}
      uses: actions/setup-node@v4
      with:
        node-version: ${{ env.NODE_VERSION }}
    
    - name: Install OpenClaw
      run: npm install -g openclaw@latest
    
    - name: Verify
      run: |
        openclaw --version
    
    - name: Create package
      shell: pwsh
      run: |
        New-Item -ItemType Directory -Force -Path millionclaw | Out-Null
        "MillionClaw vlatest - OpenClaw Desktop" | Out-File millionclaw/version.txt -Encoding ASCII
        "@echo off" | Out-File millionclaw/start.bat -Encoding ASCII
        "openclaw start" | Out-File millionclaw/start.bat -Encoding ASCII -Append
        "MillionClaw - See README.md" | Out-File millionclaw/README.txt -Encoding ASCII
        Copy-Item README.md millionclaw/
        Compress-Archive -Path millionclaw -DestinationPath millionclaw.zip -Force
    
    - name: Upload
      uses: actions/upload-artifact@v4
      with:
        name: millionclaw-windows
        path: millionclaw.zip
        retention-days: 30

  release:
    runs-on: ubuntu-latest
    needs: build
    if: github.event_name == 'push' && github.ref == 'refs/heads/master'
    
    steps:
    - name: Download
      uses: actions/download-artifact@v4
      with:
        name: millionclaw-windows
        path: .
    
    - name: Create Release
      uses: softprops/action-gh-release@v2
      with:
        files: millionclaw.zip
        prerelease: true
        tag_name: v0.1.0
        name: MillionClaw v0.1.0
        body: |
          ## MillionClaw (百万爪) - First Release
          
          A user-friendly OpenClaw desktop companion for Windows.
          
          ### Quick Start
          1. Download and extract the ZIP
          2. Double-click start.bat
          3. Enjoy your AI assistant!
          
          ### Requirements
          - Windows 10+ (x64)
          - Node.js 22+
          
          ### Learn More
          - GitHub: https://github.com/jixiaolany/MillionClaw
          - Docs: https://docs.openclaw.ai
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}