name: Build MillionClaw EXE

on:
  push:
    branches: [ master, main ]
  workflow_dispatch:

env:
  NODE_VERSION: '22'

jobs:
  build:
    runs-on: windows-latest
    
    steps:
    - name: Checkout
      uses: actions/checkout@v4
      with:
        fetch-depth: 1
    
    - name: Setup Node.js ${{ env.NODE_VERSION }}
      uses: actions/setup-node@v4
      with:
        node-version: ${{ env.NODE_VERSION }}
    
    - name: Install pnpm
      run: npm install -g pnpm
    
    - name: Install deps
      run: pnpm install --ignore-scripts
    
    - name: Build OpenClaw
      run: pnpm exec tsdown
    
    - name: Verify dist
      run: |
        echo "=== Checking dist ==="
        if (Test-Path dist/index.js) {
          $size = (Get-Item dist/index.js).Length
          echo "dist/index.js exists: $([math]::Round($size/1MB, 2)) MB"
        } else {
          echo "dist/index.js NOT FOUND"
          exit 1
        }
    
    - name: Install pkg
      run: npm install -g pkg
    
    - name: Package EXE
      run: |
        echo "=== Packaging EXE ==="
        pkg dist/index.js --targets node18-win-x64 --output millionclaw.exe
        if (Test-Path millionclaw.exe) {
          $size = (Get-Item millionclaw.exe).Length
          echo "SUCCESS: millionclaw.exe created: $([math]::Round($size/1MB, 2)) MB"
        } else {
          echo "FAILED: millionclaw.exe not created"
          exit 1
        }
    
    - name: Create package
      shell: pwsh
      run: |
        New-Item -ItemType Directory -Force -Path millionclaw-package | Out-Null
        Copy-Item millionclaw.exe millionclaw-package/
        @'
MillionClaw (百万爪)
===================
OpenClaw Desktop for Windows

How to use:
1. Double-click millionclaw.exe
2. Or run: millionclaw.exe start

Requirements:
- Windows 10+ (x64)
- Node.js 18+ (bundled)

Learn more: https://github.com/jixiaolany/MillionClaw
'@ | Out-File millionclaw-package/README.txt -Encoding ASCII
        Copy-Item README.md millionclaw-package/ -ErrorAction SilentlyContinue
        Compress-Archive -Path millionclaw-package -DestinationPath millionclaw-windows.zip -Force
        $size = (Get-Item millionclaw-windows.zip).Length
        echo "Package created: $([math]::Round($size/1MB, 2)) MB"
    
    - name: Upload
      uses: actions/upload-artifact@v4
      with:
        name: millionclaw-windows
        path: millionclaw-windows.zip
        retention-days: 30

  release:
    runs-on: ubuntu-latest
    needs: build
    if: github.event_name == 'push' && github.ref == 'refs/heads/master'
    
    steps:
    - name: Download
      uses: actions/download-artifact@v4
      with:
        name: millionclaw-windows
        path: .
    
    - name: Create Release
      uses: softprops/action-gh-release@v2
      with:
        files: millionclaw-windows.zip
        prerelease: true
        generate_release_notes: true
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}